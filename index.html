<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>⚡ Elevate Content Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --indigo:#1B0A6E;--blue:#00B4D8;--grey:#63666A;--bg:#F0F7FA;--dark:#1A1A2E;
  --white:#fff;--border:#E5E7EB;--green:#059669;--amber:#D97706;--red:#DC2626;
  --muted:#9CA3AF;--surface:#fff;
}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--dark);-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── LAYOUT ─────────────────────────────────────── */
#app{max-width:430px;margin:0 auto;min-height:100svh;display:flex;flex-direction:column;position:relative}

/* ── HEADER ─────────────────────────────────────── */
#hdr{
  background:linear-gradient(135deg,#1B0A6E 0%,#0D3B6E 55%,#007DA8 100%);
  padding:16px 18px 13px;position:sticky;top:0;z-index:100;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-logo-img{height:36px;width:auto;object-fit:contain;flex-shrink:0}
.hdr-wordmark{color:#fff;font-weight:800;font-size:13px;letter-spacing:-.2px;line-height:1.2}
.hdr-sub{color:rgba(255,255,255,.5);font-size:10px;font-weight:500}

.hdr-bot{display:flex;align-items:center;justify-content:space-between}
#sync-info{font-size:10px;color:rgba(255,255,255,.4)}
#sync-btn{
  background:rgba(255,255,255,.15);color:#fff;
  border:1px solid rgba(255,255,255,.25);border-radius:8px;
  padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:opacity .15s;
}
#sync-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── TABS ────────────────────────────────────────── */
#tabs{
  display:flex;background:#fff;
  border-bottom:2px solid var(--border);
  position:sticky;top:77px;z-index:99;
}
.tab{
  flex:1;padding:11px 6px;border:none;background:none;
  font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-2px;
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:color .15s,border-color .15s;position:relative;white-space:nowrap;
}
.tab.active{color:var(--indigo);font-weight:800;border-bottom-color:var(--indigo)}
.tab-badge{
  background:var(--red);color:#fff;border-radius:20px;
  padding:1px 5px;font-size:9px;font-weight:800;
}

/* ── MAIN CONTENT ────────────────────────────────── */
#main{padding:14px 13px 88px;flex:1;animation:fadeUp .2s ease}

/* ── FOOTER ──────────────────────────────────────── */
#foot{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(255,255,255,.94);backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
  padding:8px 18px max(10px, env(safe-area-inset-bottom));
  display:flex;justify-content:space-between;align-items:center;z-index:97;
}
.foot-l{font-size:10px;color:var(--muted)}
.foot-r{font-size:10px;font-weight:700;color:var(--indigo)}

/* ── SECTION HDR ─────────────────────────────────── */
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.sec-title{font-size:11px;font-weight:800;color:var(--grey);letter-spacing:.06em;text-transform:uppercase}
.sec-ct{background:var(--indigo);color:#fff;border-radius:20px;padding:1px 8px;font-size:10px;font-weight:800}

/* ── PROGRESS CARD ───────────────────────────────── */
.prog-card{background:#fff;border-radius:13px;padding:14px 15px;margin-bottom:13px;border:1.5px solid var(--border)}
.prog-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.prog-val{font-size:12px;font-weight:800;color:var(--green)}
.prog-bar-bg{height:7px;background:#F3F4F6;border-radius:4px;overflow:hidden;margin-bottom:10px}
.prog-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--indigo),var(--blue));transition:width .5s ease}
.prog-dots{display:flex;gap:12px;flex-wrap:wrap}
.prog-dot{display:flex;align-items:center;gap:4px;font-size:10px;color:#6B7280}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── FILTER CHIPS ────────────────────────────────── */
.chips{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:#fff;color:#6B7280;cursor:pointer;transition:all .12s;white-space:nowrap}
.chip.ap{background:var(--indigo);color:#fff;border-color:var(--indigo)}
.chip.as{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── CN CARD (Content Needed) ────────────────────── */
.cn-card{
  background:#fff;border-radius:14px;border:1.5px solid var(--border);
  margin-bottom:10px;overflow:hidden;
}
.cn-card.is-claimed{border-color:#A7F3D0;background:#F0FDF4}
.cn-card.is-submitted{border-color:#93C5FD;background:#EFF6FF}

.cn-top{padding:13px 14px;cursor:pointer}
.cn-r1{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.cn-title{font-size:13px;font-weight:700;color:var(--dark);flex:1;line-height:1.35}
.st-pill{flex-shrink:0;padding:3px 8px;border-radius:20px;font-size:9px;font-weight:800;white-space:nowrap;border:1.5px solid}
.st-open{background:#FEF9C3;color:#92400E;border-color:#FDE68A}
.st-claimed{background:#D1FAE5;color:#065F46;border-color:#6EE7B7}
.st-submitted{background:#DBEAFE;color:#1E3A8A;border-color:#93C5FD}
.cn-r2{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cn-r2 .chevron{color:#D1D5DB;font-size:10px;margin-left:auto;transition:transform .2s;display:inline-block}
.cn-r2 .chevron.up{transform:rotate(180deg)}
.cn-notes-preview{font-size:11px;color:var(--muted);line-height:1.45;margin-top:6px}

.cn-body{border-top:1px solid #F3F4F6;padding:13px 14px;background:#FAFAFA;display:flex;flex-direction:column;gap:11px}
.cn-body.is-claimed{background:#F0FDF4}
.cn-body.is-submitted{background:#EFF6FF}

/* ── FORM FIELDS ─────────────────────────────────── */
.f-label{font-size:10px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase}
.f-input{
  width:100%;border:1.5px solid var(--border);border-radius:9px;
  padding:10px 12px;font-size:13px;outline:none;background:#fff;
  transition:border-color .15s,box-shadow .15s;
}
.f-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,180,216,.1)}
.f-input.err{border-color:var(--red)}
.f-input::placeholder{color:#C4C9CF}
.f-input:disabled{background:#F9FAFB;color:#9CA3AF}
.f-textarea{
  width:100%;border:1.5px solid var(--border);border-radius:9px;
  padding:10px 12px;font-size:13px;outline:none;background:#fff;
  resize:vertical;line-height:1.5;
  transition:border-color .15s,box-shadow .15s;
}
.f-textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,180,216,.1)}
.f-textarea.mono{font-family:'DM Mono',monospace;font-size:12px;line-height:1.65;background:#FAFAFA;min-height:180px}
.f-textarea:disabled{background:#F9FAFB;color:#9CA3AF}
.f-row{display:flex;gap:8px;align-items:stretch}
.f-row .f-input{flex:1}

/* ── BUTTONS ─────────────────────────────────────── */
.btn{border:none;border-radius:10px;padding:11px 16px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:hover:not(:disabled){opacity:.88}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--indigo),var(--blue));color:#fff;width:100%}
.btn-danger{background:#FEF2F2;color:var(--red);border:1.5px solid #FECACA;width:100%}
.btn-ghost{background:#F0F7FA;color:var(--indigo);border:1.5px solid rgba(0,180,216,.25)}
.btn-sm{padding:6px 13px;font-size:12px;border-radius:8px;flex-shrink:0}
.btn-submit-sm{background:var(--indigo);color:#fff;border-radius:9px;border:none;padding:0 14px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;white-space:nowrap;transition:opacity .15s;min-height:42px}
.btn-submit-sm:hover{opacity:.88}
.btn-submit-sm:disabled{opacity:.4;cursor:not-allowed}

/* ── INFO PILLS ──────────────────────────────────── */
.info-pill{display:flex;align-items:center;gap:7px;border-radius:9px;padding:9px 12px;font-size:12px;font-weight:600}
.info-pill.green{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7}
.info-pill.blue{background:#DBEAFE;color:#1E3A8A;border:1px solid #93C5FD;overflow:hidden}
.info-pill.blue a{color:#1D4ED8;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-decoration:none}
.info-pill.blue a:hover{text-decoration:underline}
.info-pill.yellow{background:#FEF9C3;color:#78350F;border:1px solid #FDE68A;font-size:11px}

/* ── PLATFORM BADGE ──────────────────────────────── */
.plat{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid}
.plat-Instagram{background:#fdf0f5;color:#E1306C;border-color:rgba(225,48,108,.15)}
.plat-Instagram-Story,.plat-Instagram-\(Story\){background:#f5f0fd;color:#833AB4;border-color:rgba(131,58,180,.15)}
.plat-Instagram-Reel{background:#fff3f0;color:#F56040;border-color:rgba(245,96,64,.15)}
.plat-Facebook{background:#f0f5ff;color:#1877F2;border-color:rgba(24,119,242,.15)}
.plat-TikTok{background:#f5f5f5;color:#111;border-color:rgba(0,0,0,.1)}

/* ── STATUS BADGE ────────────────────────────────── */
.sbadge{padding:3px 8px;border-radius:20px;font-size:9px;font-weight:800;border:1px solid;white-space:nowrap;cursor:pointer;transition:opacity .1s}
.sbadge.ns{background:#F3F4F6;color:#6B7280;border-color:rgba(107,114,128,.2)}
.sbadge.ip{background:#EFF6FF;color:#2563EB;border-color:rgba(37,99,235,.2)}
.sbadge.sub{background:#FFFBEB;color:#D97706;border-color:rgba(217,119,6,.2)}
.sbadge.dn{background:#ECFDF5;color:#059669;border-color:rgba(5,150,105,.2)}
.sbadge.nc{cursor:default}

/* ── CAL CARD ────────────────────────────────────── */
.cal-card{background:#fff;border-radius:12px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:8px;transition:box-shadow .2s}
.cal-card.exp{box-shadow:0 4px 18px rgba(27,10,110,.09)}
.cal-top{padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.cal-meta{flex:1;min-width:0}
.cal-badges{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.cal-title{font-size:13px;font-weight:600;color:var(--dark);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-title.wrap{white-space:normal}
.cal-end{display:flex;align-items:center;gap:5px;flex-shrink:0}
.caret{color:#D1D5DB;font-size:10px;transition:transform .2s}
.caret.up{transform:rotate(180deg)}
.cal-body{border-top:1px solid #F3F4F6;padding:12px 13px;background:#FAFAFA;display:flex;flex-direction:column;gap:10px}
.body-lbl{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase}
.caption-pre{font-size:12px;color:#374151;white-space:pre-line;line-height:1.6;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;max-height:100px;overflow-y:auto;font-family:'DM Mono',monospace}
.notes-txt{font-size:12px;color:#6B7280;line-height:1.5}
.btn-write{width:100%;border:none;border-radius:10px;padding:11px;font-weight:700;font-size:13px;cursor:pointer;transition:opacity .15s}
.btn-write.has{background:#F0F7FA;color:var(--indigo);border:1.5px solid rgba(0,180,216,.25)}
.btn-write.no{background:linear-gradient(135deg,var(--indigo),var(--blue));color:#fff}
.btn-write:hover{opacity:.88}

/* ── PLAN DOCUMENT ───────────────────────────────── */
.doc-wrap{font-family:'DM Sans',system-ui,sans-serif;color:var(--dark)}
.doc-cover{background:linear-gradient(135deg,#1B0A6E 0%,#0D3B6E 55%,#007DA8 100%);border-radius:14px;padding:20px 18px 18px;margin-bottom:20px;color:#fff}
.doc-cover-eyebrow{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;opacity:.5;margin-bottom:6px}
.doc-cover-title{font-size:18px;font-weight:800;line-height:1.2;margin-bottom:4px}
.doc-cover-sub{font-size:12px;opacity:.65;margin-bottom:12px}
.doc-cover-chips{display:flex;gap:6px;flex-wrap:wrap}
.doc-cover-chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:600}
.doc-section{margin-bottom:22px}
.doc-h1{font-size:15px;font-weight:800;color:var(--indigo);letter-spacing:-.2px;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid rgba(27,10,110,.1)}
.doc-h2{font-size:12px;font-weight:800;color:var(--grey);letter-spacing:.07em;text-transform:uppercase;margin:14px 0 7px}
.doc-p{font-size:13px;color:#374151;line-height:1.65;margin-bottom:8px}
.doc-callout{background:#F0F7FA;border-left:3px solid var(--blue);border-radius:0 9px 9px 0;padding:10px 13px;font-size:12px;color:var(--indigo);font-weight:600;line-height:1.5;margin-bottom:10px}
.doc-week-band{display:flex;align-items:stretch;border-radius:11px;overflow:hidden;margin-bottom:16px;border:1.5px solid var(--border)}
.doc-week-accent{width:5px;flex-shrink:0}
.doc-week-body{flex:1;padding:13px 14px}
.doc-week-label{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;opacity:.5;margin-bottom:2px}
.doc-week-theme{font-size:14px;font-weight:800;color:var(--dark);margin-bottom:3px}
.doc-week-goal{font-size:11px;color:#6B7280;line-height:1.4}
.doc-plat-row{margin-bottom:10px}
.doc-plat-lbl{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.doc-plat-name{font-size:11px;font-weight:800}
.doc-post-list{list-style:none;padding:0;margin:0}
.doc-post-list li{display:flex;gap:8px;align-items:baseline;padding:4px 0;border-bottom:1px solid #F9FAFB;font-size:12px;color:#374151;line-height:1.5}
.doc-post-list li:last-child{border-bottom:none}
.doc-post-num{font-size:10px;font-weight:800;color:var(--muted);flex-shrink:0;width:14px;text-align:right}
.doc-post-type{font-size:9px;font-weight:800;border-radius:4px;padding:1px 5px;flex-shrink:0;margin-top:1px}
.doc-post-text{flex:1}
.doc-post-cta{font-size:11px;font-style:italic;margin-top:1px}
.doc-action-list{list-style:none;padding:0;margin:0}
.doc-action-list li{display:flex;gap:8px;padding:5px 0;font-size:12px;color:#374151;line-height:1.5;border-bottom:1px solid #F9FAFB}
.doc-action-list li:last-child{border-bottom:none}
.doc-action-list li::before{content:"□";font-size:13px;color:var(--indigo);flex-shrink:0;margin-top:1px}
.doc-kpi-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #F3F4F6;font-size:12px}
.doc-kpi-row:last-child{border-bottom:none}
.doc-divider{height:1px;background:var(--border);margin:18px 0}
.doc-tagline{text-align:center;font-size:11px;font-style:italic;color:var(--muted);padding:8px 0 4px}

/* ── WEEK PLAN ───────────────────────────────────── */

.wk-eyebrow{font-size:10px;font-weight:700;letter-spacing:.1em;opacity:.55;margin-bottom:3px;text-transform:uppercase}
.wk-theme{font-size:16px;font-weight:800;margin-bottom:5px}
.wk-desc{font-size:12px;opacity:.75;margin-bottom:5px;line-height:1.4}
.wk-goal{font-size:11px;opacity:.6;line-height:1.4}


/* ── MODAL ───────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(10,5,40,.75);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:1000;animation:fadeIn .18s ease}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:430px;max-height:93vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(27,10,110,.3);animation:slideUp .22s ease;padding-bottom:max(16px,env(safe-area-inset-bottom))}
.sheet-handle{display:flex;justify-content:center;padding:11px 0 0}
.handle-bar{width:34px;height:4px;background:#E5E7EB;border-radius:2px}
.sheet-hdr{padding:11px 18px 14px;border-bottom:1px solid #F3F4F6;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.sheet-title{font-weight:800;font-size:15px;color:var(--indigo)}
.btn-close{background:#F3F4F6;border:none;color:#6B7280;width:30px;height:30px;border-radius:7px;font-size:16px;cursor:pointer;flex-shrink:0}
.sheet-body{padding:14px 18px;display:flex;flex-direction:column;gap:13px}
.concept-pill{background:#F0F7FA;border-radius:9px;padding:9px 13px;font-size:13px;color:var(--indigo);font-weight:600;line-height:1.4}
.btn-gen{width:100%;border:none;border-radius:11px;padding:13px;font-weight:800;font-size:14px;cursor:pointer;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-gen.ready{background:linear-gradient(135deg,var(--indigo),var(--blue));color:#fff}
.btn-gen.loading{background:#E5E7EB;color:#9CA3AF;cursor:not-allowed}
.btn-gen:disabled{cursor:not-allowed}
.err-box{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:8px;padding:10px 12px;font-size:12px;color:var(--red);line-height:1.4}
.action-row{display:flex;gap:8px}
.action-btn{flex:1;border-radius:10px;padding:11px 8px;font-weight:700;font-size:12px;cursor:pointer;border:1.5px solid;transition:opacity .15s;text-align:center}
.action-btn:hover{opacity:.88}
.action-btn.draft{background:#F0F7FA;color:var(--indigo);border-color:rgba(0,180,216,.25)}
.action-btn.submit{background:#FFFBEB;color:var(--amber);border-color:#FCD34D}
.action-btn.approve{width:100%;background:#ECFDF5;color:var(--green);border-color:#6EE7B7;font-size:14px;padding:13px;font-weight:800}

/* ── EMPTY STATE ─────────────────────────────────── */
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty-icon{font-size:34px;margin-bottom:11px}
.empty-title{font-size:14px;font-weight:700;color:var(--grey);margin-bottom:6px}
.empty-desc{font-size:12px;line-height:1.5}

/* ── SPINNERS ────────────────────────────────────── */
.spin{width:15px;height:15px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;animation:spin .7s linear infinite}
.spin-sm{width:10px;height:10px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;animation:spin .7s linear infinite}
.spin-dark{width:13px;height:13px;border-radius:50%;border:2px solid rgba(27,10,110,.15);border-top-color:var(--indigo);animation:spin .7s linear infinite}

/* ── CALENDAR GRID ───────────────────────────────── */
.cal-week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px;overflow-x:auto}
.cal-day-col{min-width:42px}
.cal-day-hdr{text-align:center;padding:6px 2px 4px;border-radius:8px 8px 0 0}
.cal-day-name{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.cal-day-num{font-size:17px;font-weight:800;color:var(--dark);line-height:1.1;margin-top:1px}
.cal-day-hdr.today .cal-day-name{color:var(--blue)}
.cal-day-hdr.today .cal-day-num{color:var(--indigo)}
.cal-day-hdr.today{background:rgba(0,180,216,.07);border-radius:8px;padding:6px 4px 4px}

<script>
/* ══════════════════════════════════════════════════
   DATA
══════════════════════════════════════════════════ */
const PLAT_ICON = {Instagram:"📸","Instagram (Story)":"⭕","Instagram Reel":"🎬",Facebook:"👥",TikTok:"🎵"};
const PLAT_COLOR = {
  Instagram:{t:"#E1306C",bg:"rgba(225,48,108,.08)"},
  "Instagram (Story)":{t:"#833AB4",bg:"rgba(131,58,180,.08)"},
  "Instagram Reel":{t:"#F56040",bg:"rgba(245,96,64,.08)"},
  Facebook:{t:"#1877F2",bg:"rgba(24,119,242,.08)"},
  TikTok:{t:"#111",bg:"rgba(0,0,0,.05)"}
};
const STAT_CYCLE = {"Not started":"In progress","In progress":"Submitted","Submitted":"Done","Done":"Not started"};
const STAT_CLS = {"Not started":"ns","In progress":"ip","Submitted":"sub","Done":"dn"};

/* ══════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════ */
let S = {
  tab: "needed",

  filterPlat: "All",
  filterStat: "All",

  expPosts: new Set(),
  expNeeded: new Set(),
  modalId: null,
  syncing: false,
  syncDone: false,
  lastSync: null,
  posts: []   // populated exclusively from Notion sync — never hardcoded
};

/* ══════════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════════ */
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function platBadge(p){
  const key = p.replace(/[^a-zA-Z]/g,'-');
  const icon = PLAT_ICON[p] || '📱';
  return `<span class="plat plat-${key}">${icon} ${esc(p)}</span>`;
}

function statBadge(s, clickable){
  const cls = STAT_CLS[s] || 'ns';
  return `<button class="sbadge ${cls}${clickable?'':' nc'}" ${clickable?'onclick="cycleStatus(event)"':''}>${esc(s||'Not started')}</button>`;
}

// All users have full access — role toggle removed
const canCycle = () => true;
const canEdit   = () => true;
const canApprove = () => true;

/* ══════════════════════════════════════════════════
   NOTION SYNC (direct Notion REST API)
══════════════════════════════════════════════════ */

// Database IDs (from the collection:// URLs)
const DB_CURRENT  = "24c3728fa92680f0ba7ac2f76c641683";  // current week
const DB_NEXT     = "3203728fa92680f384aad2552712eb3f";  // next week planning

// nextWeekItems holds rows fetched live from the "next week planning" DB.
// Only rows with Need Content = true appear in the Needed tab.
// This is separate from S.posts (which is the current-week calendar).
let nextWeekItems = [];   // { notionUrl, title, platform, notes, claimedBy, contentLink, needContent }
let syncErrors = [];      // surfaces errors to the UI

// Retrieve token from localStorage (persisted across sessions)
function getToken(){ return localStorage.getItem('notion_token') || ''; }
function saveToken(t){ localStorage.setItem('notion_token', t.trim()); }

// Notion REST API helper — queries a database and returns all pages
async function notionQueryDB(dbId, token, filter){
  const headers = {
    "Authorization": "Bearer " + token,
    "Content-Type": "application/json",
    "Notion-Version": "2022-06-28"
  };
  const body = filter ? {filter} : {};
  const pages = [];
  let cursor = undefined;
  do {
    const payload = {...body, page_size: 100};
    if(cursor) payload.start_cursor = cursor;
    const res = await fetch(`https://api.notion.com/v1/databases/${dbId}/query`, {
      method:"POST", headers, body: JSON.stringify(payload)
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({message:res.statusText}));
      throw new Error(err.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    pages.push(...(data.results || []));
    cursor = data.has_more ? data.next_cursor : undefined;
  } while(cursor);
  return pages;
}

// Update a Notion page's properties via REST API
async function notionUpdatePage(pageId, token, properties){
  const res = await fetch(`https://api.notion.com/v1/pages/${pageId}`, {
    method:"PATCH",
    headers:{
      "Authorization":"Bearer " + token,
      "Content-Type":"application/json",
      "Notion-Version":"2022-06-28"
    },
    body: JSON.stringify({properties})
  });
  if(!res.ok){
    const err = await res.json().catch(()=>({message:res.statusText}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  return res.json();
}

// Extract property value from a Notion page object
function notionProp(page, key){
  const p = page.properties?.[key];
  if(!p) return null;
  switch(p.type){
    case 'title':      return p.title?.map(t=>t.plain_text).join('') || '';
    case 'rich_text':  return p.rich_text?.map(t=>t.plain_text).join('') || '';
    case 'select':     return p.select?.name || '';
    case 'status':     return p.status?.name || '';
    case 'checkbox':   return p.checkbox === true;
    case 'url':        return p.url || '';
    case 'date':       return p.date?.start || null;
    case 'files':      return (p.files||[]).length > 0;
    default:           return null;
  }
}

// Build Notion property patch object from friendly key→value map
function buildNotionProps(updates){
  const props = {};
  for(const [k, v] of Object.entries(updates)){
    if(k === 'Status')     props[k] = {status:{name: v}};
    else if(k === 'Caption' || k === 'Claimed By' || k === 'Notes')
                            props[k] = {rich_text:[{text:{content: String(v)}}]};
    else if(k === 'Content Link') props[k] = {url: v || null};
    else if(k === 'Need Content') props[k] = {checkbox: !!v};
  }
  return props;
}

async function syncNotion(){
  if(S.syncing) return;
  const token = getToken();
  if(!token){ render(); return; }   // show token screen

  S.syncing = true;
  syncErrors = [];
  const btn = document.getElementById('sync-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin-sm"></div> Syncing…';

  const [nextRes, curRes] = await Promise.allSettled([
    notionQueryDB(DB_NEXT, token),
    notionQueryDB(DB_CURRENT, token),
  ]);

  // Parse next-week results
  if(nextRes.status === 'fulfilled'){
    nextWeekItems = nextRes.value.map((page, i) => ({
      id: 'nw-' + i,
      pageId: page.id,
      notionUrl: page.url || '',
      title: notionProp(page, 'Notes') || '(Untitled)',
      platform: notionProp(page, 'Platform') || '',
      notes: notionProp(page, 'Notes') || '',
      status: notionProp(page, 'Status') || 'Not started',
      claimedBy: notionProp(page, 'Claimed By') || '',
      contentLink: notionProp(page, 'Content Link') || '',
      needContent: notionProp(page, 'Need Content') === true,
    }));
  } else {
    syncErrors.push('Next week DB: ' + nextRes.reason?.message);
  }

  // Parse current-week results — replaces S.posts entirely
  if(curRes.status === 'fulfilled'){
    S.posts = curRes.value.map((page, i) => ({
      id: 'cw-' + i,
      pageId: page.id,
      notionUrl: page.url || '',
      title: notionProp(page, 'Week of March 9, 2025') || '(Untitled)',
      platform: notionProp(page, 'Platform') || '',
      type: notionProp(page, 'Platform') || '',
      status: notionProp(page, 'Status') || 'Not started',
      caption: notionProp(page, 'Caption') || '',
      notes: notionProp(page, 'Notes') || '',
      date: notionProp(page, 'Date') || null,
      needContent: notionProp(page, 'Need Content') === true,
      claimedBy: notionProp(page, 'Claimed By') || '',
      contentLink: notionProp(page, 'Content Link') || '',
      hasPost: notionProp(page, 'Post') === true,
    }));
  } else {
    syncErrors.push('Current week DB: ' + curRes.reason?.message);
  }

  S.syncDone = true;
  S.lastSync = new Date();
  S.syncing = false;
  btn.disabled = false;

  if(syncErrors.length){
    btn.innerHTML = '⚠️ Sync error';
    document.getElementById('sync-info').textContent = syncErrors[0];
    setTimeout(()=>{ btn.innerHTML = '↑ Sync Notion'; }, 5000);
  } else {
    btn.innerHTML = '✓ Synced';
    document.getElementById('sync-info').textContent = `Synced ${S.lastSync.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
    setTimeout(()=>{ btn.innerHTML = '↑ Sync Notion'; }, 3000);
  }
  render();
}

async function writeNotion(item, updates){
  // Writes back to the next-week planning DB by page ID
  if(!item?.pageId) return;
  const token = getToken();
  if(!token) return;
  notionUpdatePage(item.pageId, token, buildNotionProps(updates)).catch(()=>{});
}

async function writeCalNotion(item, updates){
  // Writes back to the current-week DB by page ID
  if(!item?.pageId) return;
  const token = getToken();
  if(!token) return;
  notionUpdatePage(item.pageId, token, buildNotionProps(updates)).catch(()=>{});
}

/* ══════════════════════════════════════════════════
   TOKEN SETUP SCREEN
══════════════════════════════════════════════════ */
function renderTokenSetup(){
  return `<div style="padding:4px 0">
    <div style="background:linear-gradient(135deg,#1B0A6E,#007DA8);border-radius:14px;padding:20px 18px;color:#fff;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.6;margin-bottom:6px">One-time setup</div>
      <div style="font-size:17px;font-weight:800;margin-bottom:6px">Connect to Notion</div>
      <div style="font-size:12px;opacity:.75;line-height:1.5">This app reads directly from your Notion databases. You need a Notion integration token to get started — it only takes 2 minutes.</div>
    </div>

    <div style="background:#fff;border:1.5px solid var(--border);border-radius:13px;padding:16px;margin-bottom:12px">
      <div style="font-size:11px;font-weight:800;color:var(--indigo);letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px">How to get your token</div>
      ${[
        ['1', 'Go to', 'notion.so/profile/integrations', 'https://www.notion.so/profile/integrations'],
        ['2', 'Click <strong>"New integration"</strong> → name it (e.g. "Content Hub") → Save', null, null],
        ['3', 'Copy the <strong>Internal Integration Token</strong> (starts with <code>ntn_</code>)', null, null],
        ['4', 'Open your <strong>Content Planning Calendar</strong> in Notion → click <strong>⋯ → Connections → Add connection</strong> → pick your new integration', null, null],
        ['5', 'Paste the token below and tap Connect', null, null],
      ].map(([n,label,linkText,linkUrl])=>`
        <div style="display:flex;gap:10px;margin-bottom:10px;align-items:flex-start">
          <span style="width:20px;height:20px;border-radius:50%;background:var(--indigo);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">${n}</span>
          <span style="font-size:12px;color:#374151;line-height:1.5">${label}${linkText?` <a href="${linkUrl}" target="_blank" style="color:var(--blue);font-weight:600">${linkText}</a>`:''}</span>
        </div>`).join('')}
    </div>

    <div style="background:#fff;border:1.5px solid var(--border);border-radius:13px;padding:16px;margin-bottom:12px">
      <div style="font-size:11px;font-weight:800;color:var(--grey);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px">Paste your token</div>
      <input id="token-input" type="password"
        placeholder="ntn_xxxxxxxxxxxxxxxxxxxx"
        style="width:100%;border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;font-size:13px;font-family:'DM Mono',monospace;outline:none;margin-bottom:10px"
        value="${esc(getToken())}"
      />
      <button onclick="saveTokenAndSync()"
        style="width:100%;background:linear-gradient(135deg,var(--indigo),var(--blue));color:#fff;border:none;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer">
        Connect &amp; Sync →
      </button>
      <div id="token-err" style="font-size:11px;color:#DC2626;margin-top:8px;display:none"></div>
    </div>

    <div style="font-size:11px;color:var(--muted);text-align:center;line-height:1.5;padding:4px 12px">
      🔒 Your token is stored only in your browser's local storage — never sent anywhere except directly to Notion's API.
    </div>
  </div>`;
}

async function saveTokenAndSync(){
  const input = document.getElementById('token-input');
  const errEl = document.getElementById('token-err');
  const token = (input?.value || '').trim();
  if(!token.startsWith('ntn_') && !token.startsWith('secret_')){
    if(errEl){ errEl.textContent = 'Token should start with ntn_ or secret_'; errEl.style.display='block'; }
    return;
  }
  saveToken(token);
  syncNotion();
}

/* ══════════════════════════════════════════════════
   CONTENT NEEDED TAB
══════════════════════════════════════════════════ */
function renderNeeded(){
  // Token gate — must set up Notion token first
  if(!getToken()) return renderTokenSetup();

  // Show sync errors prominently if any
  const errBanner = syncErrors.length
    ? `<div style="background:#FEF2F2;border:1.5px solid #FCA5A5;border-radius:11px;padding:12px 14px;margin-bottom:12px;font-size:12px;color:#991B1B;line-height:1.5">
        <strong>⚠️ Sync error</strong><br>${syncErrors.map(e=>`<div style="margin-top:4px;font-family:monospace;font-size:11px;word-break:break-all">${esc(e)}</div>`).join('')}
       </div>`
    : '';

  // Not yet synced
  if(!S.syncDone){
    return `${errBanner}<div class="empty">
      <div class="empty-icon">🔄</div>
      <div class="empty-title">Sync to load content requests</div>
      <div class="empty-desc">Tap <strong>↑ Sync Notion</strong> above to pull from your <em>Elevate Fitness (next week planning)</em> database. Only rows with the <strong>"Need Content"</strong> checkbox checked will appear here.</div>
    </div>`;
  }

  const all = nextWeekItems.filter(p => p.needContent === true);

  if(!all.length){
    return `${errBanner}<div class="empty">
      <div class="empty-icon">✅</div>
      <div class="empty-title">No content requests right now</div>
      <div class="empty-desc">In Notion, check the <strong>"Need Content"</strong> box on any row in <em>Elevate Fitness (next week planning)</em> to surface it here for the team to claim.</div>
    </div>`;
  }

  let html = errBanner;
  all.forEach(p => { html += needCard(p); });
  return html;
}

function needCard(p){
  const exp = S.expNeeded.has(p.id);
  const isClaimed   = !!p.claimedBy;
  const isSubmitted = !!p.contentLink;

  let cardCls = '', topPillCls = 'st-open', topPillLabel = 'Open';
  if(isSubmitted){ cardCls='is-submitted'; topPillCls='st-submitted'; topPillLabel='✓ Submitted'; }
  else if(isClaimed){ cardCls='is-claimed'; topPillCls='st-claimed'; topPillLabel=`Claimed`; }

  let body = '';
  if(exp){
    let bodyCls = isSubmitted ? 'is-submitted' : isClaimed ? 'is-claimed' : '';
    body += `<div class="cn-body ${bodyCls}">`;

    // Content brief
    if(p.notes){
      body += `<div>
        <label class="f-label">Content Brief</label>
        <div style="font-size:13px;color:#374151;line-height:1.6;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px">${esc(p.notes)}</div>
      </div>`;
    }

    if(!isSubmitted){
      if(!isClaimed){
        // Claim form
        body += `<div>
          <label class="f-label">Your Name</label>
          <div class="f-row">
            <input class="f-input" id="name-${p.id}" type="text" placeholder="Enter your name to claim this…" style="min-height:42px"/>
            <button class="btn-submit-sm" onclick="claimPost('${p.id}')">Claim it →</button>
          </div>
        </div>`;
      } else {
        // Claimed by — show + unclaim
        body += `<div class="info-pill green">👤 Claimed by <strong style="margin-left:3px">${esc(p.claimedBy)}</strong>
          ${canEdit()?`<button onclick="unclaimPost('${p.id}')" style="margin-left:auto;background:none;border:none;color:var(--red);font-size:11px;font-weight:700;cursor:pointer;padding:0">Unclaim</button>`:''}
        </div>`;

        // Drive link submission
        body += `<div>
          <label class="f-label">Paste Google Drive Link</label>
          <div class="f-row">
            <input class="f-input" id="link-${p.id}" type="url" placeholder="https://drive.google.com/…" style="min-height:42px"/>
            <button class="btn-submit-sm" onclick="submitLink('${p.id}')">Submit →</button>
          </div>
          <div style="font-size:10px;color:var(--muted);margin-top:5px">⚠️ Set the Drive file to "Anyone with the link can view" before submitting.</div>
        </div>`;
      }
    } else {
      // Submitted — show info + link
      body += `<div class="info-pill green">👤 ${esc(p.claimedBy)} · Content submitted</div>`;
      body += `<div class="info-pill blue">🔗 <a href="${esc(p.contentLink)}" target="_blank" rel="noopener">View submitted content ↗</a></div>`;

      // Admin: allow link update
      if(canEdit()){
        body += `<div>
          <label class="f-label">Update Link</label>
          <div class="f-row">
            <input class="f-input" id="link-${p.id}" type="url" placeholder="Paste updated Drive link…" value="${esc(p.contentLink)}" style="min-height:42px"/>
            <button class="btn-submit-sm" onclick="submitLink('${p.id}')">Update</button>
          </div>
        </div>`;
      }
    }

    // Remove from Content Needed (always visible — only you are accessing this app)
    body += `<button class="btn btn-danger" onclick="toggleNeedContent('${p.id}')">✕ Remove from Content Needed</button>`;

    body += `</div>`;
  }

  return `<div class="cn-card ${cardCls}" id="cn-${p.id}">
    <div class="cn-top" onclick="toggleNeeded('${p.id}')">
      <div class="cn-r1">
        <div class="cn-title">${esc(p.title)}</div>
        <span class="st-pill ${topPillCls}">${topPillLabel}</span>
      </div>
      <div class="cn-r2">
        ${p.platform ? platBadge(p.platform) : ''}
        <span class="chevron${exp?' up':''}">▼</span>
      </div>
      ${!exp && p.notes ? `<div class="cn-notes-preview">${esc(p.notes.length>95 ? p.notes.slice(0,95)+'…' : p.notes)}</div>` : ''}
    </div>
    ${body}
  </div>`;
}

/* ══════════════════════════════════════════════════
   CALENDAR TAB — Weekly Grid View (live from Notion)
══════════════════════════════════════════════════ */
function renderCalendar(){
  // Token gate
  if(!getToken()) return renderTokenSetup();

  // Gate: prompt sync if no live data yet
  if(!S.lastSync){
    return `<div class="empty">
      <div class="empty-icon">📅</div>
      <div class="empty-title">Sync to load this week's calendar</div>
      <div class="empty-desc">Tap <strong>↑ Sync Notion</strong> above to pull live posts from <em>Elevate Fitness (current week)</em> in Notion.</div>
    </div>`;
  }

  if(!S.posts.length){
    return `<div class="empty">
      <div class="empty-icon">✅</div>
      <div class="empty-title">No posts in the current week database</div>
      <div class="empty-desc">Add rows to <em>Elevate Fitness (current week)</em> in Notion, then sync again.</div>
    </div>`;
  }

  // Progress bar
  const doneCount = S.posts.filter(p=>p.status==='Done').length;
  const pct = S.posts.length ? Math.round((doneCount/S.posts.length)*100) : 0;
  const DOT = {"Not started":"#6B7280","In progress":"#2563EB","Submitted":"#D97706","Done":"#059669"};
  const sCts = {};
  ["Not started","In progress","Submitted","Done"].forEach(s=>{ sCts[s]=S.posts.filter(p=>p.status===s).length; });

  let html = `<div class="prog-card">
    <div class="prog-hdr"><span class="prog-label">This Week</span><span class="prog-val">${doneCount}/${S.posts.length} done · ${pct}%</span></div>
    <div class="prog-bar-bg"><div class="prog-bar" style="width:${pct}%"></div></div>
    <div class="prog-dots">${["Not started","In progress","Submitted","Done"].map(s=>`<div class="prog-dot"><div class="dot" style="background:${DOT[s]}"></div>${s}: <strong>${sCts[s]||0}</strong></div>`).join('')}</div>
  </div>`;

  // Platform filter chips only (status filter removed for clean calendar view)
  const plats = ["All","Instagram","Facebook","TikTok"];
  html += `<div class="chips">${plats.map(p=>`<button class="chip${S.filterPlat===p?' ap':''}" onclick="setFP('${p}')">${PLAT_ICON[p]||'📱'} ${p}</button>`).join('')}</div>`;

  const filtered = S.posts.filter(p => S.filterPlat==='All' || p.platform===S.filterPlat || p.platform.startsWith(S.filterPlat));

  // --- Build Mon–Sun grid for current week ---
  // Derive week start from today (March 2026 context) or first dated post
  const today = new Date();
  const dayOfWeek = today.getDay(); // 0=Sun
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() + mondayOffset);
  weekStart.setHours(0,0,0,0);

  const days = Array.from({length:7},(_,i)=>{
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate()+i);
    return d;
  });

  const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // Slot posts by date
  const byDate = {};
  const unscheduled = [];
  filtered.forEach(p => {
    if(p.date){
      const key = p.date.slice(0,10);
      (byDate[key]||(byDate[key]=[])).push(p);
    } else {
      unscheduled.push(p);
    }
  });

  // Helper: status color
  function slotColor(status){
    return DOT[status]||DOT['Not started'];
  }

  // Helper: platform slot CSS class
  function slotCls(platform){
    if(platform.startsWith('Instagram(Story)')||platform==='Instagram (Story)') return 'cal-slot-story';
    if(platform.startsWith('Instagram')) return 'cal-slot-ig';
    if(platform==='Facebook') return 'cal-slot-fb';
    if(platform==='TikTok') return 'cal-slot-tt';
    return 'cal-slot-ig';
  }

  // Build grid
  html += `<div class="cal-week-grid">`;
  days.forEach((d,i) => {
    const key = d.toISOString().slice(0,10);
    const isToday = d.toDateString() === today.toDateString();
    const posts = byDate[key]||[];
    html += `<div class="cal-day-col">
      <div class="cal-day-hdr${isToday?' today':''}">
        <div class="cal-day-name">${DAY_NAMES[i]}</div>
        <div class="cal-day-num">${d.getDate()}</div>
      </div>
      <div class="cal-day-slots">`;
    posts.forEach(p => {
      html += `<div class="${'cal-slot '+slotCls(p.platform)}" onclick="toggleExpand('${p.id}')" title="${esc(p.title)}">
        <div class="cal-slot-dot" style="background:${slotColor(p.status)}"></div>
        <div class="cal-slot-lbl" style="color:${p.platform==='TikTok'?'#111':p.platform.startsWith('Facebook')?'#1877F2':p.platform==='Instagram (Story)'?'#833AB4':'#E1306C'}">${esc(p.title)}</div>
        <div class="cal-slot-status"><div class="cal-slot-sbar" style="background:${slotColor(p.status)}"></div></div>
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;

  // Expanded card detail — shown below grid when a slot is tapped
  const expandedPosts = filtered.filter(p => S.expPosts.has(p.id) && p.date);
  const expandedUnsched = filtered.filter(p => S.expPosts.has(p.id) && !p.date);
  [...expandedPosts, ...expandedUnsched].forEach(p => {
    html += calCard(p);
  });

  // Unscheduled posts
  if(unscheduled.length){
    html += `<div class="cal-unscheduled">
      <div class="cal-unsched-hdr">📌 Unscheduled (${unscheduled.length})</div>`;
    unscheduled.forEach(p => { html += calCard(p); });
    html += `</div>`;
  }

  return html;
}

function calCard(p){
  const exp = S.expPosts.has(p.id);
  const cc  = canCycle();
  let body  = '';
  if(exp){
    body = `<div class="cal-body">`;
    if(p.caption) body += `<div><div class="body-lbl">Caption</div><div class="caption-pre">${esc(p.caption)}</div></div>`;
    else if(p.notes) body += `<div><div class="body-lbl">Notes</div><div class="notes-txt">${esc(p.notes)}</div></div>`;
    if(p.cta) body += `<div style="font-size:12px;color:var(--indigo);font-weight:600;background:#F0F7FA;border-radius:8px;padding:7px 10px">🎯 ${esc(p.cta)}</div>`;

    // Notion link — always shown, label changes based on whether creative is attached
    if(p.notionUrl){
      const label = p.hasPost ? '🎬 View Creative in Notion ↗' : '📄 Open in Notion ↗';
      body += `<a class="btn-notion" href="${esc(p.notionUrl)}" target="_blank" rel="noopener">${label}</a>`;
    }

    if(p.needContent) body += `<div class="info-pill yellow">🎬 Creative needed — check the <strong>Needed</strong> tab</div>`;
    body += `</div>`;
  }
  return `<div class="cal-card${exp?' exp':''}" id="card-${p.id}">
    <div class="cal-top" onclick="toggleExpand('${p.id}')">
      <div class="cal-meta">
        <div class="cal-badges">
          ${platBadge(p.platform)}
          ${p.date?`<span style="font-size:10px;color:var(--muted);font-weight:600">${new Date(p.date+'T12:00:00').toLocaleDateString([],{month:'short',day:'numeric'})}</span>`:'<span style="font-size:9px;background:#FEF9C3;color:#78350F;border:1px solid #FDE68A;padding:1px 6px;border-radius:10px;font-weight:700">Unscheduled</span>'}
          ${p.hasPost?'<span style="font-size:9px;background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;padding:1px 6px;border-radius:10px;font-weight:700">✓ Creative</span>':''}
          ${p.needContent?'<span style="font-size:9px;background:#FEF9C3;color:#78350F;border:1px solid #FDE68A;padding:1px 6px;border-radius:10px;font-weight:800">NEEDS CONTENT</span>':''}
        </div>
        <div class="cal-title${exp?' wrap':''}">${esc(p.title)}</div>
      </div>
      <div class="cal-end">${statBadge(p.status, cc)}<span class="caret${exp?' up':''}">▼</span></div>
    </div>
    ${body}
  </div>`;
}

  </div>

  <div class="doc-tagline">Real people. Real fitness. Real community. · elevatesyracuse.com</div>
  </div>`; // close doc-wrap

  return html;
}

/* ══════════════════════════════════════════════════
   MODAL — CAPTION EDITOR
══════════════════════════════════════════════════ */
function openModal(id){
  S.modalId = id;
  renderModal();
}
function renderModal(){
  const p = S.posts.find(x => x.id === S.modalId);
  if(!p) return;
  const ce = canEdit(), ca = canApprove();
  document.getElementById('modal').innerHTML = `
  <div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="sheet">
      <div class="sheet-handle"><div class="handle-bar"></div></div>
      <div class="sheet-hdr">
        <div>
          <div class="sheet-title">Caption Editor</div>
          <div style="margin-top:5px">${platBadge(p.platform)}</div>
        </div>
        <button class="btn-close" onclick="closeModal()">×</button>
      </div>
      <div class="sheet-body">
        <div class="concept-pill">📌 ${esc(p.title)}</div>
        <div>
          <label class="f-label">Production Notes</label>
          <textarea class="f-textarea" id="m-notes" rows="3" ${!ce?'disabled':''} placeholder="Filming notes, visual direction…">${esc(p.notes||'')}</textarea>
        </div>
        ${ce?`<button class="btn-gen ready" id="gen-btn" onclick="genCaption()">✨ Generate Elevate Caption</button>`:''}
        <div id="gen-err" style="display:none" class="err-box"></div>
        <div>
          <label class="f-label">Caption Copy</label>
          <textarea class="f-textarea mono" id="m-caption" rows="10" ${!ce?'disabled':''} placeholder="Generated caption appears here — or type manually…">${esc(p.caption||'')}</textarea>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${ce?`<div class="action-row">
            <button class="action-btn draft" onclick="saveModal('In progress')">💾 Save Draft</button>
            <button class="action-btn submit" onclick="saveModal('Submitted')">📤 Submit for Review</button>
          </div>`:''}
          ${ca?`<button class="action-btn approve" onclick="saveModal('Done')">✅ Approve Post</button>`:''}
        </div>
      </div>
    </div>
  </div>`;
}
function closeModal(){ document.getElementById('modal').innerHTML = ''; S.modalId = null; }

async function genCaption(){
  const btn = document.getElementById('gen-btn');
  const err = document.getElementById('gen-err');
  const p   = S.posts.find(x => x.id === S.modalId);
  const notes = document.getElementById('m-notes').value;
  btn.className = 'btn-gen loading';
  btn.innerHTML = '<div class="spin"></div> Generating…';
  btn.disabled = true;
  err.style.display = 'none';

  const SYS = `You are the Elevate Fitness Social Media Assistant (elevatesyracuse.com), Syracuse NY — two locations: DeWitt and Liverpool.
Brand: "More than a gym." | "Real people. Real fitness. Real community."
Voice: Inviting, energetic, motivational, human, community-first. Short punchy sentences. Use "you" and "we".
NEVER use "join now". Soft CTAs only: "book a free tour", "claim your guest pass", "try a class on us", "explore our recovery center".
Never mention prices or schedules. Refer to elevatesyracuse.com for those.
No unsafe fitness claims. Brand filter: Real, Inclusive, Elevating.
Offerings: group fitness, spin, strength/functional training, Pilates, personal training, small group PT, recovery centers (infrared sauna, compression therapy, red light therapy), pools, aquatics + swim lessons (all ages/year-round), pickleball, tennis, indoor track (Liverpool only), DEKA events.

Output EXACTLY this format — no extra text before or after:
HOOK: [1 punchy attention-grabbing line]
CAPTION:
[line 1]
[line 2]
[line 3 — optional 4th if needed]
CTA: [1 soft action CTA]
HASHTAGS: [10–12 from this bank: #ElevateSyracuse #ElevateFitness #MoreThanAGym #CNYFitness #SyracuseNY #CentralNY #FitFam #StrongerTogether #DeWittNY #LiverpoolNY #CNY #SyracuseLife #CNYWellness #GroupFitness #SpinClass #StrengthTraining #PersonalTraining #Aquatics #SwimLessons #Pickleball #Tennis #Sauna #IndoorTrack #DEKA #KeepShowingUp #YouGotThis #ProgressNotPerfection #MoveFeelLive]
ALT TEXT: [1-sentence image/video description for accessibility]
PRODUCTION NOTE: [1 practical filming or design tip]`;

  try {
    const r = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        system:SYS,
        messages:[{role:"user",content:`Platform: ${p.platform}\nPost format: ${p.type}\nConcept: ${p.title}\nCTA direction: ${p.cta||'Brand awareness or tour booking'}\nAdditional notes: ${notes||'None'}`}]
      })
    });
    const d = await r.json();
    const t = (d.content||[]).find(b=>b.type==='text')?.text || '';
    if(!t) throw new Error('empty');
    document.getElementById('m-caption').value = t;
  } catch(e){
    err.style.display = 'block';
    err.textContent = '⚠️ Generation failed. Check your connection and try again.';
  }
  btn.className = 'btn-gen ready';
  btn.innerHTML = '🔄 Regenerate';
  btn.disabled = false;
}

function saveModal(newStatus){
  const cap   = document.getElementById('m-caption');
  const notes = document.getElementById('m-notes');
  const updated = S.posts.map(p => p.id !== S.modalId ? p : {
    ...p,
    caption: cap   ? cap.value   : p.caption,
    notes:   notes ? notes.value : p.notes,
    status:  newStatus
  });
  S.posts = updated;
  const item = updated.find(p => p.id === S.modalId);
  if(item){
    const writes = {"Status": newStatus};
    if(cap) writes["Caption"] = cap.value;
    writeCalNotion(item, writes);
  }
  closeModal();
  render();
}

/* ══════════════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════════════ */
function toggleNeeded(id){ S.expNeeded.has(id) ? S.expNeeded.delete(id) : S.expNeeded.add(id); render(); }
function toggleExpand(id){ S.expPosts.has(id)  ? S.expPosts.delete(id)  : S.expPosts.add(id);  render(); }

function cycleStatus(e){
  e.stopPropagation();
  const card = e.target.closest('[id^="card-"]');
  if(!card) return;
  const id = card.id.replace('card-','');
  const p  = S.posts.find(x => x.id === id);
  if(!p || !canCycle()) return;
  const newStat = STAT_CYCLE[p.status] || 'In progress';
  S.posts = S.posts.map(x => x.id===id ? {...x, status:newStat} : x);
  writeCalNotion(p, {"Status": newStat});
  render();
}

function setFP(v){ S.filterPlat = v; render(); }


function claimPost(id){
  const el = document.getElementById('name-'+id);
  const name = el ? el.value.trim() : '';
  if(!name){ if(el){ el.classList.add('err'); el.placeholder='Enter your name first'; } return; }
  // Update local state immediately for responsive UI
  const item = nextWeekItems.find(x => x.id === id);
  if(item){ item.claimedBy = name; }
  // Auto-sync to Notion — no manual refresh needed
  writeNotion(item, {"Claimed By": name, "Status": "In progress"});
  render();
}

function unclaimPost(id){
  const item = nextWeekItems.find(x => x.id === id);
  if(item){ item.claimedBy = ''; item.contentLink = ''; }
  writeNotion(item, {"Claimed By": "", "Content Link": "", "Status": "Not started"});
  render();
}

function submitLink(id){
  const el  = document.getElementById('link-'+id);
  const url = el ? el.value.trim() : '';
  if(!url || !url.startsWith('http')){ if(el){ el.classList.add('err'); el.placeholder='Paste a valid link'; } return; }
  const item = nextWeekItems.find(x => x.id === id);
  if(item){ item.contentLink = url; }
  writeNotion(item, {"Content Link": url});
  render();
}

function toggleNeedContent(id){
  const item = nextWeekItems.find(x => x.id === id);
  if(item){ item.needContent = !item.needContent; }
  writeNotion(item, {"Need Content": item && item.needContent ? "__YES__" : "__NO__"});
  render();
}

/* ══════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════ */
function render(){
  // Tab badge — total content requests not yet delivered
  const openNeeded = nextWeekItems.filter(p => p.needContent && !p.contentLink).length;
  document.querySelectorAll('.tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === S.tab);
  });
  // Re-render tab strip with badges
  document.getElementById('tabs').innerHTML = `
    <button class="tab${S.tab==='needed'?' active':''}" data-tab="needed" onclick="setTab('needed')">🎬 Needed${openNeeded?` <span class="tab-badge">${openNeeded}</span>`:''}</button>
    <button class="tab${S.tab==='calendar'?' active':''}" data-tab="calendar" onclick="setTab('calendar')">📅 Calendar</button>
    <button class="tab${S.tab==='plan'?' active':''}" data-tab="plan" onclick="setTab('plan')">🗓 Plan</button>
  `;

const main = document.getElementById('main');
  main.style.animation = 'none';
  main.innerHTML = S.tab==='needed' ? renderNeeded() : S.tab==='calendar' ? renderCalendar() : renderPlan();
  void main.offsetWidth;
  main.style.animation = 'fadeUp .2s ease';
}

function setTab(t){ S.tab = t; render(); }

/* ── BOOT ── */
// Dynamic header month
(function(){
  const m = new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'});
  document.getElementById('hdr-month').textContent = m;
})();
document.getElementById('sync-btn').addEventListener('click', ()=>{
  if(!getToken()){ S.tab='needed'; render(); }  // show token setup
  else syncNotion();
});
render();
</script>
